name: n_app_frontend
description: Frontend for N APP - admin-user communication system
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  provider: ^6.1.1
  socket_io_client: ^2.0.3+1
  flutter_secure_storage: ^9.0.0
  http: ^1.2.0
  image_picker: ^1.0.7
  file_picker: ^8.0.0
  record: ^7.0.0
  audioplayers: ^5.2.1
  video_player: ^2.8.2
  intl: ^0.19.0
  flutter_webrtc: ^1.0.0
  connectivity_plus: ^6.0.3
  scrollable_positioned_list: ^0.3.8
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1
  path_provider: ^2.1.2
  permission_handler: ^11.3.1
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#012169"
  adaptive_icon_foreground: "assets/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/ringtone.mp3
    - assets/outgoing_ringback.mp3
    - assets/outgoing_ringback.wav
